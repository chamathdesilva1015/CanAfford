name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm install

    - name: Frontend CI
      run: |
        cd frontend
        npm install
        npm run type-check || echo "No type-check script"
        npm test || echo "No test script"

    - name: Backend CI
      run: |
        cd backend
        npm install
        npm test || echo "No test script"
